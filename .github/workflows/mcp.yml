name: Validate and deploy career MCP

on:
  pull_request:
    paths:
      - candidate-profile.yaml
      - mcp/**
      - .github/workflows/mcp.yml
  push:
    branches: [main]
    paths:
      - candidate-profile.yaml
      - mcp/**
      - .github/workflows/mcp.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: career-mcp-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: mcp

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.18"
          cache: npm
          cache-dependency-path: mcp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate sanitized data
        run: npm run generate:data
        env:
          GITHUB_SHA: ${{ github.sha }}

      - name: Check generated Worker types
        run: npm run types:check

      - name: Type-check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build Worker dry run
        run: npm run bundle:check

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: validate
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.18"
          cache: npm
          cache-dependency-path: mcp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate sanitized data
        run: npm run generate:data
        env:
          GITHUB_SHA: ${{ github.sha }}

      - name: Deploy Worker
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Smoke-test deployed MCP
        run: npm run smoke:remote
        env:
          MCP_URL: ${{ vars.MCP_URL }}
